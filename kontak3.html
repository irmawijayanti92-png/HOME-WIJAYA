<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
color:white;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
padding:18px 70px;
display:flex;
justify-content:space-between;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-family:'Montserrat',sans-serif;
font-size:24px;
font-weight:700;
}

.menu{display:flex;gap:30px;list-style:none}
.menu a{color:white;text-decoration:none}

/* HERO */
.hero{
min-height:100vh;
background:url("img/WIJAYA\ HOME\ LIVING.png") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
position:relative;
padding-top:80px;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.65);
}

.container{
position:relative;
z-index:2;
width:90%;
max-width:1100px;
animation:fadeUp 1.2s;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px)}
to{opacity:1}
}

h1{
font-family:'Montserrat',sans-serif;
text-align:center;
margin-bottom:40px;
font-size:40px;
}

/* BOX */
.contact-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.box{
background:rgba(255,255,255,0.1);
padding:28px;
border-radius:14px;
transition:.4s;
}

.box:hover{
transform:translateY(-8px);
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 18px;
background:#ffcc66;
color:#333;
text-decoration:none;
border-radius:8px;
}

/* MAP */
.map{
margin-top:40px;
border-radius:15px;
overflow:hidden;
}

iframe{
width:100%;
height:350px;
border:0;
}
</style>
</head>
