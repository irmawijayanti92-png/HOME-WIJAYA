<!DOCTYPE html>

<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;color:#333}

/* NAVBAR */
.navbar{
position:fixed;width:100%;top:0;
padding:18px 70px;
display:flex;justify-content:space-between;
background:rgba(255,255,255,.6);
backdrop-filter:blur(12px);
z-index:1000;
}
.logo{font-family:'Playfair Display',serif;font-size:26px}
.menu{display:flex;gap:30px;list-style:none}
.menu a{text-decoration:none;color:#333;font-weight:400}

/* HERO */
.hero{
min-height:100vh;
padding-top:120px; /* supaya tidak ketutup navbar */
background:url("img/WIJAYA\ HOME\ LIVING.png") center/cover no-repeat;
display:flex;align-items:center;justify-content:center;
position:relative;text-align:center;
}

.hero::after{
content:"";
position:absolute;inset:0;
background:rgba(255,255,255,.6);
backdrop-filter:blur(4px);
}

.content{
position:relative;z-index:2;
animation:fadeUp 1.2s;
margin-top:40px;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1}
}

h1{
font-family:'Playfair Display',serif;
font-size:46px;margin-bottom:10px;
}

p{margin-bottom:40px;color:#555}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
max-width:1100px;margin:auto;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
text-decoration:none;color:#333;
box-shadow:0 8px 20px rgba(0,0,0,.08);
transition:.35s;
}

.card img{
width:100%;height:200px;object-fit:cover;
}

.card h3{padding:18px;font-weight:600}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 15px 30px rgba(0,0,0,.15);
}

/* BUTTON */
.btn{
display:inline-block;margin-top:40px;
padding:12px 30px;border-radius:30px;
background:#e8dfd6;color:#333;text-decoration:none;
transition:.3s;
}
.btn:hover{background:#d8c7b6}

footer{text-align:center;padding:40px;color:#888}
</style>
</head>

<body>

</nav>

</div>
