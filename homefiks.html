<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wijaya Home Living</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins', sans-serif;
  background:#0f0f0f;
  color:#fff;
  overflow-x:hidden;
}

/* ===== NAVBAR ===== */
nav{
  position:fixed;
  top:0;
  width:100%;
  padding:18px 70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(10px);
  z-index:1000;
  animation:fadeDown 1.2s ease;
}

nav .logo{
  font-family:'Playfair Display', serif;
  font-size:22px;
  letter-spacing:2px;
}

nav ul{
  list-style:none;
  display:flex;
  gap:40px;
}

nav ul li a{
  text-decoration:none;
  color:#fff;
  font-size:14px;
  letter-spacing:2px;
  position:relative;
}

nav ul li a::after{
  content:'';
  position:absolute;
  left:0;
  bottom:-8px;
  width:0;
  height:1px;
  background:#d6bfa3;
  transition:.4s;
}

nav ul li a:hover::after{
  width:100%;
}

/* ===== HERO SECTION ===== */
.hero{
  height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.6), rgba(0,0,0,.6)),
    url("img/WIJAYA\ HOME\ LIVING.png");
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding-top:80px;
}

.hero-content{
  max-width:850px;
  animation:fadeUp 1.5s ease forwards;
}

.hero h1{
  font-family:'Playfair Display', serif;
  font-size:3.8rem;
  letter-spacing:4px;
  margin-bottom:20px;
}

.hero h1 span{
  color:#d6bfa3;
}

.hero p{
  font-size:1.1rem;
  line-height:1.9;
  color:#ddd;
  margin-bottom:45px;
}

/* BUTTON */
.btn{
  padding:15px 45px;
  border:1px solid #d6bfa3;
  color:#d6bfa3;
  text-decoration:none;
  letter-spacing:3px;
  transition:.4s ease;
  position:relative;
  overflow:hidden;
}

.btn::before{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:#d6bfa3;
  transition:.4s ease;
  z-index:-1;
}

.btn:hover::before{
  left:0;
}

.btn:hover{
  color:#000;
}

/* SCROLL TEXT */
.scroll{
  position:absolute;
  bottom:35px;
  font-size:12px;
  letter-spacing:3px;
  opacity:.7;
  animation:upDown 2s infinite;
}

/* ANIMATIONS */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(70px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes fadeDown{
  from{
    opacity:0;
    transform:translateY(-40px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes upDown{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(12px)}
}

/* RESPONSIVE */
@media(max-width:768px){
  nav{
    padding:15px 30px;
  }
  nav ul{
    gap:20px;
  }
  .hero h1{
    font-size:2.5rem;
  }
}
</style>
</head>

<body>

<<!-- NAVBAR -->
<nav class="navbar">

  <ul class="menu">

    <li><a href="kontak3.html">Kontak</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>WIJAYA <span>HOME LIVING</span></h1>
    <p>
      Furniture berkelas dengan desain elegan dan kualitas premium  
      untuk menghadirkan kenyamanan dan kemewahan di setiap ruang.
    </p>
<a href="katalog2.html" class="btn">LIHAT KATALOG</a>
  </div>


</body>
</html>
